# Coolify deployment — static PSYKE site served by Caddy.
#
# In Coolify:
#   1. New Resource → Docker Compose → point at this repo.
#   2. Set the domain (e.g. https://psyke.gcanon.de) on the `web` service;
#      Coolify's Traefik handles routing + TLS automatically.
#   3. Deploy. Coolify builds the Dockerfile and proxies to port 80.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set NUXT_PUBLIC_GA_ID in Coolify's env (e.g. G-XXXXXXXXXX) to enable
        # Google Analytics. Leave unset to keep analytics off.
        - NUXT_PUBLIC_GA_ID=${NUXT_PUBLIC_GA_ID:-}
    restart: unless-stopped
    environment:
      # Coolify magic var: binds the generated/assigned domain to this
      # service on port 80 (Caddy). Coolify fills in the FQDN at deploy time.
      - SERVICE_FQDN_WEB=/
      - PORT=80
    # Container port Traefik routes to.
    expose:
      - "80"
    # Lightweight health check
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
